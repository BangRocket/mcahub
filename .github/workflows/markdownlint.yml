name: markdownlint

# Lints the project's human-facing markdown (README, SECURITY.md, CLAUDE.md). Scope lives in
# .markdownlint-cli2.jsonc — no `globs:` input here, so the config file drives both glob
# discovery and the .claude/** ignore. This check IS expected to stay green — make it a
# required status check.

on:
  push:
    branches: [main]
    paths:
      - '**/*.md'
      - '.markdownlint-cli2.jsonc'
      - '.github/workflows/markdownlint.yml'
  pull_request:
    paths:
      - '**/*.md'
      - '.markdownlint-cli2.jsonc'
      - '.github/workflows/markdownlint.yml'

permissions:
  contents: read

concurrency:
  group: markdownlint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  markdownlint:
    name: markdownlint-cli2
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: DavidAnson/markdownlint-cli2-action@ded1f9488f68a970bc66ea5619e13e9b52e601cd # v23.2.0
