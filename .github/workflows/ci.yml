name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out hub
        uses: actions/checkout@v4
        with:
          path: mcahub

      - name: Check out mcadiff core (pinned)
        uses: actions/checkout@v4
        with:
          repository: BangRocket/mcadiff
          ref: 41f6f2fd2b4d7f2bef935646ae8a7763526e4d6d
          path: mca-git

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        working-directory: mcahub
        run: dotnet restore McadiffHub.slnx

      - name: Build
        working-directory: mcahub
        run: dotnet build McadiffHub.slnx --configuration Release --no-restore

      - name: Test
        working-directory: mcahub
        run: dotnet test McadiffHub.slnx --configuration Release --no-build
