name: codeql

# Static security analysis. The hub accepts untrusted input from two directions — the network
# (anyone who can push to it) and attacker-controlled world data that gets parsed, materialized
# to disk, and rendered to images (see SECURITY.md) — exactly the profile CodeQL's C#
# taint-tracking queries are built for. `build-mode: none` analyzes from source, so this job
# does NOT need the sibling mca-git checkout.

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '41 4 * * 1'   # weekly sweep picks up newly-released queries

permissions: {}

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: analyze (csharp)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # upload SARIF results
      actions: read
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: github/codeql-action/init@87557b9c84dde89fdd9b10e88954ac2f4248e463 # v4.36.1
        with:
          languages: csharp
          build-mode: none
          queries: security-extended
      - uses: github/codeql-action/analyze@87557b9c84dde89fdd9b10e88954ac2f4248e463 # v4.36.1
