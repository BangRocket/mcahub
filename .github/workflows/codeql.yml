name: codeql

# Static security analysis. The hub accepts untrusted input from two directions — the network
# (anyone who can push to it) and attacker-controlled world data that gets parsed, materialized
# to disk, and rendered to images (see SECURITY.md) — exactly the profile CodeQL's C#
# taint-tracking queries are built for. `build-mode: none` analyzes from source, so this job
# does NOT need the mcagit engine binary present.

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '41 4 * * 1'   # weekly sweep picks up newly-released queries

permissions: {}

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: analyze (csharp)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # upload SARIF results
      actions: read
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: csharp
          build-mode: none
          queries: security-extended
      - uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
