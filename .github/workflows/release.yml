name: release

# On a version tag, publish the container image to GHCR and self-contained binaries to the GitHub Release,
# so non-developers can run the hub with no .NET SDK and no submodule checkout.
on:
  push:
    tags: ['v*']

permissions:
  contents: write   # attach binaries to the release
  packages: write   # push the image to GHCR

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive   # the Dockerfile COPYs the vendored core
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  binaries:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rid: [linux-x64, linux-arm64, win-x64, osx-x64, osx-arm64]
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: Publish self-contained
        run: |
          dotnet publish src/McadiffHub/McadiffHub.csproj -c Release -r ${{ matrix.rid }} \
            --self-contained true -p:PublishSingleFile=true -o publish
          tar czf "mcadiff-hub-${{ github.ref_name }}-${{ matrix.rid }}.tar.gz" -C publish .
      - uses: softprops/action-gh-release@v2
        with:
          files: mcadiff-hub-${{ github.ref_name }}-${{ matrix.rid }}.tar.gz
